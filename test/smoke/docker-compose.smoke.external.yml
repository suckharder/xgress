# Smoke variant: external Traefik (mirrors docker-compose.external.yml). xgress runs
# managed=false (no supervised Traefik); a separate Traefik container polls xgress's
# token-gated provider over the Docker network and reads the static config xgress
# writes to the shared volume. The proxy (:80) is published by the traefik service;
# the admin API (:8088) by xgress. xgress's own container is still hardened/non-root.
services:
  xgress:
    image: xgress:test
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE]
    ports:
      - {target: 8088, host_ip: 127.0.0.1, protocol: tcp}   # admin only; proxy is on traefik
    volumes:
      - xgress_data:/data
      - traefik_static:/data/traefik   # xgress writes traefik.yml here
    environment:
      XGRESS_TRAEFIK_MANAGED: "false"
      XGRESS_PROVIDER_LISTEN: ":9000"
      XGRESS_PROVIDER_ADVERTISE: "http://xgress:9000"
      XGRESS_ADMIN_LISTEN: ":8088"
      XGRESS_EDGE_LISTEN: ":9100"
      XGRESS_EDGE_ADVERTISE: "http://xgress:9100"
    depends_on:
      whoami: {condition: service_started}

  traefik:
    image: traefik:v3.7.5@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
    restart: unless-stopped
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports:
      - {target: 80, host_ip: 127.0.0.1, protocol: tcp}
      - {target: 443, host_ip: 127.0.0.1, protocol: tcp}   # TLS cert-serving check
    volumes:
      - traefik_static:/etc/traefik    # reads the static config xgress writes
      - xgress_data:/data
    depends_on:
      xgress: {condition: service_started}

  whoami:
    image: traefik/whoami@sha256:200689790a0a0ea48ca45992e0450bc26ccab5307375b41c84dfc4f2475937ab

volumes:
  xgress_data:
  traefik_static:
