# Smoke variant: WAF through an EXTERNAL Traefik. xgress runs managed=false and declares
# the Coraza plugin in the static config it writes (XGRESS_WAF_PRELOAD=true); the separate
# Traefik fetches the WASM plugin from the catalog on boot and persists it under
# /data/plugins-storage (working_dir: /data) so it's not re-downloaded each restart.
# Proves WAF *blocking* works in external mode (the rules are inlined into the served
# config). NOT hermetic — the external Traefik needs outbound internet for the plugin
# fetch, so the test skips when the plugin catalog is unreachable.
services:
  xgress:
    image: xgress:test
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE]
    ports:
      - {target: 8088, host_ip: 127.0.0.1, protocol: tcp}   # admin only; proxy is on traefik
    volumes:
      - xgress_data:/data
      - traefik_static:/data/traefik   # xgress writes traefik.yml here
    environment:
      XGRESS_WAF_PRELOAD: "true"          # declare the Coraza plugin in the static config
      XGRESS_TRAEFIK_MANAGED: "false"
      XGRESS_PROVIDER_LISTEN: ":9000"
      XGRESS_PROVIDER_ADVERTISE: "http://xgress:9000"
      XGRESS_ADMIN_LISTEN: ":8088"
      XGRESS_EDGE_LISTEN: ":9100"
      XGRESS_EDGE_ADVERTISE: "http://xgress:9100"
    depends_on:
      whoami: {condition: service_started}

  traefik:
    image: traefik:v3.7.5@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
    working_dir: /data                 # persist the fetched Coraza plugin (/data/plugins-storage)
    restart: unless-stopped
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports:
      - {target: 80, host_ip: 127.0.0.1, protocol: tcp}
    volumes:
      - traefik_static:/etc/traefik    # reads the static config xgress writes
      - xgress_data:/data
    depends_on:
      xgress: {condition: service_started}

  whoami:
    image: traefik/whoami@sha256:200689790a0a0ea48ca45992e0450bc26ccab5307375b41c84dfc4f2475937ab

volumes:
  xgress_data:
  traefik_static:
