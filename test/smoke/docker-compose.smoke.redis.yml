# Smoke variant: single-container + Redis (mirrors docker-compose.redis.yml).
# Proves the native server-side cache backed by Redis (XGRESS_REDIS_URL).
services:
  xgress:
    image: xgress:test
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE]
    ports:
      - {target: 8088, host_ip: 127.0.0.1, protocol: tcp}
      - {target: 80, host_ip: 127.0.0.1, protocol: tcp}
    volumes:
      - xgress_data:/data
    environment:
      XGRESS_REDIS_URL: "redis:6379"
    depends_on:
      redis: {condition: service_healthy}
      whoami: {condition: service_started}

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15

  whoami:
    image: traefik/whoami@sha256:200689790a0a0ea48ca45992e0450bc26ccab5307375b41c84dfc4f2475937ab

volumes:
  xgress_data:
