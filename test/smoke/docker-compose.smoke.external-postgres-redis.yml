# Smoke variant: external Traefik + Postgres + Redis — the full HA stack
# (mirrors docker-compose.external-postgres-redis.yml).
services:
  xgress:
    image: xgress:test
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE]
    ports:
      - {target: 8088, host_ip: 127.0.0.1, protocol: tcp}
    volumes:
      - xgress_data:/data
      - traefik_static:/data/traefik
    environment:
      XGRESS_WAF_PRELOAD: "false"
      XGRESS_TRAEFIK_MANAGED: "false"
      XGRESS_PROVIDER_LISTEN: ":9000"
      XGRESS_PROVIDER_ADVERTISE: "http://xgress:9000"
      XGRESS_ADMIN_LISTEN: ":8088"
      XGRESS_EDGE_LISTEN: ":9100"
      XGRESS_EDGE_ADVERTISE: "http://xgress:9100"
      XGRESS_DB_DRIVER: "postgres"
      XGRESS_DB_DSN: "postgres://xgress:xgress@db:5432/xgress?sslmode=disable"
      XGRESS_REDIS_URL: "redis:6379"
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
      whoami: {condition: service_started}

  traefik:
    image: traefik:v3.7.5@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
    restart: unless-stopped
    command: ["--configFile=/etc/traefik/traefik.yml"]
    ports:
      - {target: 80, host_ip: 127.0.0.1, protocol: tcp}
    volumes:
      - traefik_static:/etc/traefik
      - xgress_data:/data
    depends_on:
      xgress: {condition: service_started}

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xgress
      POSTGRES_PASSWORD: xgress
      POSTGRES_DB: xgress
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xgress"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15

  whoami:
    image: traefik/whoami@sha256:200689790a0a0ea48ca45992e0450bc26ccab5307375b41c84dfc4f2475937ab

volumes:
  xgress_data:
  traefik_static:
