# External Traefik + Redis for the server-side cache
# See docker-compose.external.yml for the external-Traefik wiring
# Enable the cache in Settings, then toggle it per host
services:
  xgress:
    build: .
    container_name: xgress
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # --- Hardening (keep):
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    # ---
    environment:
      XGRESS_TRAEFIK_MANAGED: "false"           # don't spawn Traefik
      XGRESS_PROVIDER_LISTEN: ":9000"            # reachable on the docker network
      XGRESS_PROVIDER_ADVERTISE: "http://xgress:9000"
      XGRESS_ADMIN_LISTEN: ":8088"
      XGRESS_EDGE_LISTEN: ":9100"
      XGRESS_EDGE_ADVERTISE: "http://xgress:9100"
      XGRESS_REDIS_URL: "redis:6379"
    ports:
      - "127.0.0.1:8088:8088"                # Admin UI
    volumes:
      - xgress_data:/data
      - traefik_static:/data/traefik         # shared static config

  traefik:
    # Pinned + digest-locked to the supported Traefik (v3.7.5)
    image: traefik:v3.7.5@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
    working_dir: /data   # persist the fetched WAF plugin across restarts
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - xgress
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_static:/etc/traefik          # reads the static config xgress writes
      - xgress_data:/data                     # acme material, if any

  redis:
    image: redis:7-alpine
    container_name: xgress-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - xgress_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  xgress_data:
  traefik_static:
  xgress_redis:
