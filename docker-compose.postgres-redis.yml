# Single-container xgress + Postgres (config) + Redis (shared cache)
# The backing set for a production / HA deployment
services:
  xgress:
    build: .
    container_name: xgress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # --- Hardening (keep):
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    # ---
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8088:8088"   # Admin UI
    volumes:
      - xgress_data:/data
    environment:
      XGRESS_DB_DRIVER: "postgres"
      XGRESS_DB_DSN: "postgres://xgress:xgress@db:5432/xgress?sslmode=disable"
      XGRESS_REDIS_URL: "redis:6379"

  db:
    image: postgres:16-alpine
    container_name: xgress-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: xgress
      POSTGRES_PASSWORD: xgress
      POSTGRES_DB: xgress
    volumes:
      - xgress_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xgress"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xgress-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - xgress_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  xgress_data:
  xgress_db:
  xgress_redis:
