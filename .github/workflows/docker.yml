name: Build and publish image

# Builds the single-container image and pushes it to GHCR
# (ghcr.io/<owner>/xgress). Publishes only on version tags (v0.9.0, v1.2.3,
# v0.9.0-rc.1, …) so merging to main does NOT trigger a build — you release
# deliberately by pushing a tag.
on:
  push:
    tags: ['v*.*.*']
  # Allow building/pushing on demand from the Actions tab.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---- Gate jobs: the image build below only runs if all of these pass. ----
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'   # matches the Dockerfile builder
      # Unit tests only — integration/smoke are behind build tags and not run here.
      - run: go test -race -cover ./...

  web-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  docker:
    needs: [go-test, web-test, vulncheck]   # build/push only on a green commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR with GITHUB_TOKEN
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables building the arm64 image on the amd64 runner via emulation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags/labels: `latest` + branch for main, semver for tags,
      # and the short SHA for every build.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `latest` is added automatically by metadata-action's default
          # (latest=auto): only on non-prerelease semver tags, so v0.9.0 gets
          # `latest` but v0.9.0-rc.1 does not.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # arm64 builds run under QEMU emulation, so this job is noticeably
          # slower than amd64-only — the gha cache keeps subsequent runs fast.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
