# External Traefik + Postgres (instead of SQLite)
# See docker-compose.external.yml for how the external-Traefik wiring works
services:
  xgress:
    build: .
    container_name: xgress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # --- Hardening (keep):
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    # ---
    environment:
      XGRESS_TRAEFIK_MANAGED: "false"           # don't spawn Traefik
      XGRESS_PROVIDER_LISTEN: ":9000"            # reachable on the docker network
      XGRESS_PROVIDER_ADVERTISE: "http://xgress:9000"
      XGRESS_ADMIN_LISTEN: ":8088"
      XGRESS_EDGE_LISTEN: ":9100"
      XGRESS_EDGE_ADVERTISE: "http://xgress:9100"
      XGRESS_DB_DRIVER: "postgres"
      XGRESS_DB_DSN: "postgres://xgress:xgress@db:5432/xgress?sslmode=disable"
    ports:
      - "127.0.0.1:8088:8088"                # Admin UI
    volumes:
      - xgress_data:/data
      - traefik_static:/data/traefik         # shared static config

  traefik:
    # Pinned + digest-locked to the supported Traefik (v3.7.5)
    image: traefik:v3.7.5@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
    working_dir: /data   # persist the fetched WAF plugin across restarts
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - xgress
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_static:/etc/traefik          # reads the static config xgress writes
      - xgress_data:/data                     # acme material, if any

  db:
    image: postgres:16-alpine
    container_name: xgress-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: xgress
      POSTGRES_PASSWORD: xgress
      POSTGRES_DB: xgress
    volumes:
      - xgress_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xgress"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  xgress_data:
  traefik_static:
  xgress_db:
