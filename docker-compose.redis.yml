# Single-container xgress + Redis for the server-side cache
# Enable the cache in Settings, then toggle it per host
services:
  xgress:
    build: .
    container_name: xgress
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # --- Hardening (keep):
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    # ---
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8088:8088"   # Admin UI
    volumes:
      - xgress_data:/data
    environment:
      XGRESS_REDIS_URL: "redis:6379"

  redis:
    image: redis:7-alpine
    container_name: xgress-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - xgress_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  xgress_data:
  xgress_redis:
